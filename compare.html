<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FNSpots — Compare</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/sprites.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--fn:'Bebas Neue',sans-serif;--bg:#F5F0E8;--surface:#FFFFFF;--surface2:#EDE8DF;--border:#D8D0C4;--border-strong:#B8AFA0;--text:#2A2520;--muted:#8A8278;--purple:#7f77dd;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:2rem 1rem;}

    .site-header{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
    .site-title{font-family:var(--fn);font-size:18px;letter-spacing:.06em;color:var(--text);text-decoration:none;}
    .site-sub{font-family:var(--fn);font-size:9px;letter-spacing:.06em;color:var(--muted);}
    .back-btn{margin-left:auto;font-family:var(--fn);font-size:11px;letter-spacing:.05em;padding:6px 14px;border-radius:99px;border:1.5px solid var(--border-strong);color:var(--muted);background:transparent;cursor:pointer;text-decoration:none;}
    .back-btn:hover{background:var(--surface);}

    /* SEARCH */
    .search-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;max-width:700px;margin:0 auto 2rem;}
    .search-title{font-family:var(--fn);font-size:20px;letter-spacing:.06em;color:var(--text);margin-bottom:6px;}
    .search-sub{font-size:12px;color:var(--muted);margin-bottom:1.5rem;}
    .search-row{display:flex;gap:10px;flex-wrap:wrap;}
    .search-input{flex:1;min-width:180px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:var(--fn);letter-spacing:.04em;outline:none;transition:border .15s;}
    .search-input:focus{border-color:var(--purple);}
    .search-btn{font-family:var(--fn);font-size:13px;letter-spacing:.05em;padding:10px 22px;border-radius:10px;border:none;background:var(--purple);color:#fff;cursor:pointer;transition:background .15s;}
    .search-btn:hover{background:#6560c5;}
    .search-error{font-size:11px;color:#D4537E;margin-top:8px;min-height:16px;font-family:var(--fn);}

    /* WINNER BANNER */
    .winner-banner{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.5rem 2rem;max-width:700px;margin:0 auto 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
    .winner-trophy{font-size:40px;}
    .winner-text{flex:1;}
    .winner-name{font-family:var(--fn);font-size:24px;letter-spacing:.06em;color:var(--text);}
    .winner-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .share-btn{font-family:var(--fn);font-size:11px;letter-spacing:.05em;padding:8px 16px;border-radius:99px;border:1.5px solid var(--purple);color:var(--purple);background:transparent;cursor:pointer;transition:all .15s;margin-left:auto;}
    .share-btn:hover{background:var(--purple);color:#fff;}

    /* VS HEADER */
    .vs-header{display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;max-width:700px;margin:0 auto 1rem;align-items:center;}
    .player-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .player-avatar{width:50px;height:50px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-family:var(--fn);font-size:22px;color:#fff;}
    .player-avatar.them{background:#D4537E;}
    .player-name{font-family:var(--fn);font-size:16px;letter-spacing:.05em;color:var(--text);}
    .player-count{font-family:var(--fn);font-size:28px;color:var(--text);line-height:1;}
    .player-pct{font-size:11px;color:var(--muted);}
    .vs-badge{font-family:var(--fn);font-size:20px;letter-spacing:.06em;color:var(--muted);text-align:center;}

    /* SECTIONS */
    .section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;max-width:700px;margin:0 auto 1rem;}
    .section-title{font-family:var(--fn);font-size:13px;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .section-badge{font-size:16px;}

    .sprite-chips{display:flex;flex-wrap:wrap;gap:6px;}
    .chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--text);}
    .chip img{width:24px;height:24px;object-fit:contain;}
    .chip.both{border-color:#1D9E75;background:#E1F5EE40;color:#0F6E56;}
    .chip.mine{border-color:var(--purple);background:#EEEDFE40;color:#534AB7;}
    .chip.theirs{border-color:#D4537E;background:#FBEAF040;color:#993556;}

    .loading{text-align:center;padding:3rem;font-family:var(--fn);font-size:14px;letter-spacing:.06em;color:var(--muted);}
  </style>
</head>
<body>

<div class="site-header">
  <div>
    <a href="/" class="site-title"><img src="/Sprites_Icon_Fortnite_FNSpots.webp" style="height:18px;width:18px;object-fit:contain;vertical-align:middle;margin-right:4px;"/>FNSpots</a>
    <div class="site-sub">by gamermistere</div>
  </div>
  <a href="/" class="back-btn">← Back to Tracker</a>
</div>

<div class="search-card">
  <div class="search-title">Compare with a Friend</div>
  <div class="search-sub">Enter two gamertags to compare collections</div>
  <div class="search-row">
    <input class="search-input" id="tag1" placeholder="Your gamertag" onkeydown="if(event.key==='Enter')compare()"/>
    <input class="search-input" id="tag2" placeholder="Friend's gamertag" onkeydown="if(event.key==='Enter')compare()"/>
    <button class="search-btn" onclick="compare()">Compare 🤝</button>
  </div>
  <div class="search-error" id="searchErr"></div>
</div>

<div id="results"></div>

<script>
const SURL="https://rjqxkgdnmypfuvsgfeuh.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqcXhrZ2RubXlwZnV2c2dmZXVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzY1MTMsImV4cCI6MjA5ODExMjUxM30.Y3Z1xIZ3W5shIyHdoTz59EOoKs8q_iSN1yspFvNLsWQ";
const sb=supabase.createClient(SURL,SKEY);
const VV=["b","go","gu","ga","h","ge"];
const TOTAL=107;

// Pre-fill from URL params
const params=new URLSearchParams(window.location.search);
if(params.get("u1"))document.getElementById("tag1").value=params.get("u1");
if(params.get("u2"))document.getElementById("tag2").value=params.get("u2");
if(params.get("u1")&&params.get("u2"))compare();

async function getPlayerData(gamertag){
  const {data:profile}=await sb.from("profiles").select("id,gamertag").ilike("gamertag",gamertag).single();
  if(!profile)return null;
  const {data:progress}=await sb.from("progress").select("sprite_key,unlocked,level").eq("user_id",profile.id);
  const pmap={};
  if(progress)progress.forEach(r=>{pmap[r.sprite_key]={unlocked:r.unlocked,level:r.level};});
  return{gamertag:profile.gamertag,pmap};
}

async function compare(){
  const tag1=document.getElementById("tag1").value.trim();
  const tag2=document.getElementById("tag2").value.trim();
  const err=document.getElementById("searchErr");
  err.textContent="";
  if(!tag1||!tag2){err.textContent="Please enter both gamertags.";return;}
  if(tag1.toLowerCase()===tag2.toLowerCase()){err.textContent="Enter two different gamertags.";return;}

  document.getElementById("results").innerHTML=`<div class="loading">Comparing...</div>`;

  const [p1,p2]=await Promise.all([getPlayerData(tag1),getPlayerData(tag2)]);
  if(!p1){err.textContent=`"${tag1}" not found.`;document.getElementById("results").innerHTML="";return;}
  if(!p2){err.textContent=`"${tag2}" not found.`;document.getElementById("results").innerHTML="";return;}

  // Build collected sets
  const set1=new Set(),set2=new Set();
  SPRITES.forEach((sp,si)=>{
    VV.forEach(v=>{
      if(sp.noV&&v!=="b")return;
      const key=`${si}-${v}`;
      if(p1.pmap[key]?.unlocked)set1.add(key);
      if(p2.pmap[key]?.unlocked)set2.add(key);
    });
  });

  const both=[...set1].filter(k=>set2.has(k));
  const onlyP1=[...set1].filter(k=>!set2.has(k));
  const onlyP2=[...set2].filter(k=>!set1.has(k));
  const pct1=Math.round(set1.size/TOTAL*100);
  const pct2=Math.round(set2.size/TOTAL*100);
  const winner=set1.size>set2.size?p1.gamertag:set2.size>set1.size?p2.gamertag:"Tie";

  // Update URL
  window.history.replaceState({},"",`/compare?u1=${tag1}&u2=${tag2}`);

  function keyToChip(key,cls){
    const parts=key.split("-");
    const si=parseInt(parts[0]);
    const sp=SPRITES[si];
    if(!sp)return"";
    return`<div class="chip ${cls}"><img src="/${sp.imgs.b}" alt="${sp.name}"/>${sp.name}</div>`;
  }

  document.getElementById("results").innerHTML=`
    <div class="winner-banner">
      <div class="winner-trophy">${winner==="Tie"?"🤝":"🏆"}</div>
      <div class="winner-text">
        <div class="winner-name">${winner==="Tie"?"It's a Tie!":winner+" Wins!"}</div>
        <div class="winner-sub">${set1.size} vs ${set2.size} sprites · ${both.length} in common</div>
      </div>
      <button class="share-btn" onclick="shareCompare()">Share 🔗</button>
    </div>

    <div class="vs-header">
      <div class="player-col">
        <div class="player-avatar">${p1.gamertag[0].toUpperCase()}</div>
        <div class="player-name">${p1.gamertag}</div>
        <div class="player-count">${set1.size}</div>
        <div class="player-pct">${pct1}% complete</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="player-col">
        <div class="player-avatar them">${p2.gamertag[0].toUpperCase()}</div>
        <div class="player-name">${p2.gamertag}</div>
        <div class="player-count">${set2.size}</div>
        <div class="player-pct">${pct2}% complete</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="section-badge">✅</span> Both have (${both.length})</div>
      <div class="sprite-chips">${both.length?both.map(k=>keyToChip(k,"both")).join(""):'<div style="font-size:12px;color:var(--muted);">Nothing in common yet</div>'}</div>
    </div>

    <div class="section">
      <div class="section-title"><span class="section-badge">🔵</span> ${p1.gamertag} has · ${p2.gamertag} doesn't (${onlyP1.length})</div>
      <div class="sprite-chips">${onlyP1.length?onlyP1.map(k=>keyToChip(k,"mine")).join(""):'<div style="font-size:12px;color:var(--muted);">None</div>'}</div>
    </div>

    <div class="section">
      <div class="section-title"><span class="section-badge">🔴</span> ${p2.gamertag} has · ${p1.gamertag} doesn't (${onlyP2.length})</div>
      <div class="sprite-chips">${onlyP2.length?onlyP2.map(k=>keyToChip(k,"theirs")).join(""):'<div style="font-size:12px;color:var(--muted);">None</div>'}</div>
    </div>
  `;
}

function shareCompare(){
  const tag1=document.getElementById("tag1").value.trim();
  const tag2=document.getElementById("tag2").value.trim();
  const url=`https://fnspots.com/compare?u1=${tag1}&u2=${tag2}`;
  if(navigator.share){navigator.share({title:`${tag1} vs ${tag2} — FNSpots`,url});}
  else{navigator.clipboard.writeText(url);alert("Link copied!");}
}
</script>
</body>
</html>
