<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FNSpots — C7S3 Interactive Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet"/>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--fn:'Anton',sans-serif;--bg:#F5F0E8;--surface:#FFFFFF;--surface2:#EDE8DF;--border:#D8D0C4;--border-strong:#B8AFA0;--text:#2A2520;--muted:#8A8278;--purple:#7f77dd;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

    /* HEADER */
    .site-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
    .site-title{font-family:var(--fn);font-size:18px;letter-spacing:.06em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
    .site-title img{height:20px;width:20px;object-fit:contain;}
    .site-sub{font-family:var(--fn);font-size:9px;letter-spacing:.06em;color:var(--muted);}
    .back-btn{font-family:var(--fn);font-size:11px;letter-spacing:.05em;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.2);color:var(--muted);background:transparent;cursor:pointer;text-decoration:none;white-space:nowrap;border-color:var(--border-strong);}
    .back-btn:hover{background:rgba(255,255,255,.1);}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
    .toolbar-title{font-family:var(--fn);font-size:13px;letter-spacing:.05em;color:var(--text);margin-right:4px;}

    .layer-btn{font-family:var(--fn);font-size:10px;letter-spacing:.05em;padding:5px 12px;border-radius:99px;border:1.5px solid var(--border-strong);color:var(--muted);background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
    .layer-btn:hover{border-color:var(--purple);color:var(--purple);}
    .layer-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;}
    .layer-btn img{width:16px;height:16px;object-fit:contain;}

    .zoom-btns{margin-left:auto;display:flex;gap:4px;}
    .zoom-btn{font-family:var(--fn);font-size:14px;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);color:var(--muted);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .zoom-btn:hover{background:var(--surface2);color:var(--text);}

    /* MAP CONTAINER */
    .map-container{flex:1;overflow:hidden;position:relative;cursor:grab;user-select:none;}
    .map-container:active{cursor:grabbing;}
    .map-inner{position:absolute;transform-origin:0 0;transition:none;}
    .map-img{display:block;width:100%;height:auto;}

    /* CHEST PINS */
    .chest-pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1);z-index:10;}
    .chest-pin img{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));transition:all .2s;}
    .chest-pin:hover img,.chest-pin:active img{transform:scale(1.5);filter:drop-shadow(0 0 12px rgba(127,119,221,.9)) drop-shadow(0 4px 8px rgba(0,0,0,.8));}
    .chest-pin.hidden{display:none;}

    /* TOOLTIP */
    .chest-pin .tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--purple);border-radius:8px;padding:6px 10px;font-family:var(--fn);font-size:10px;letter-spacing:.04em;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;}
    .chest-pin:hover .tooltip{opacity:1;}

    /* POI LABELS */
    .poi-label{position:absolute;transform:translate(-50%,-50%);font-family:var(--fn);font-size:9px;letter-spacing:.05em;color:#2A2520;text-shadow:0 1px 2px rgba(255,255,255,.8);pointer-events:none;white-space:nowrap;z-index:5;}
    .poi-label.hidden{display:none;}

    /* LEGEND */
    .legend{position:absolute;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;z-index:30;}
    .legend-title{font-family:var(--fn);font-size:10px;letter-spacing:.05em;color:var(--muted);margin-bottom:8px;}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text);margin-bottom:4px;}
    .legend-item img{width:20px;height:20px;object-fit:contain;}
    .legend-count{font-family:var(--fn);font-size:12px;color:var(--text);margin-left:auto;}

    /* RESET BTN */
    .reset-view{position:absolute;bottom:16px;left:16px;font-family:var(--fn);font-size:10px;letter-spacing:.05em;padding:6px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);background:var(--surface);cursor:pointer;z-index:30;border-color:var(--border-strong);color:var(--muted);}
    .reset-view:hover{background:var(--surface2);color:var(--text);}
  </style>
</head>
<body>

</div>

<div class="map-container" id="mapContainer">

    <img src="/Shattered_Coast_Fortnite_fnspots.webp" class="map-img" id="mapImg" draggable="false"/>

  <div class="legend">

    <div class="legend-item">
      <img src="/Sprite_Chest_Fortnite_fnspots.webp" alt="chest"/>
      Sprite Chest
      <span class="legend-count">33</span>
    </div>
    <div class="legend-item">
      <img src="/Boss_Sprite_FORTNITE_fnspots.webp" alt="boss"/>
      Boss Sprite
      <span class="legend-count" style="color:#A32D2D;">8</span>
    </div>
    <div class="legend-item">
      <img src="/Fishy_Sprite_Fortnite_FNSpots.webp" alt="fishy"/>
      Fishy Sprite
      <span class="legend-count" style="color:#1D9E75;">6</span>
    </div>
    <div class="legend-item">
      <img src="/Vault_-_Fortnite_fnspots.webp" alt="vault"/>

const MAX_SCALE = 5;

const mapInner = document.getElementById('mapInner');
const mapContainer = document.getElementById('mapContainer');

// Build boss layer
const bossLayer = document.getElementById('bossLayer');
BOSSES.forEach((b) => {

  `;
  pin.dataset.layer = 'boss';
  bossLayer.appendChild(pin);
});

// Build fishy layer
const fishyLayer = document.getElementById('fishyLayer');
FISHYS.forEach((f) => {
  const pin = document.createElement('div');
  pin.className = 'chest-pin';
  pin.style.left = f.x + '%';
  pin.style.top = f.y + '%';
  pin.innerHTML = `
    <img src="/Fishy_Sprite_Fortnite_FNSpots.webp" alt="Fishy Sprite" style="width:36px;height:36px;filter:drop-shadow(0 0 8px rgba(29,158,117,.9)) drop-shadow(0 2px 6px rgba(0,0,0,.8));"/>
    <div class="tooltip" style="border-color:#1D9E75;">🐟 Fishy Sprite</div>
  `;
  pin.dataset.layer = 'fishy';
  fishyLayer.appendChild(pin);
});

// Build vault layer
const vaultLayer = document.getElementById('vaultLayer');
VAULTS.forEach((v) => {
  const pin = document.createElement('div');
  pin.className = 'chest-pin';
  pin.style.left = v.x + '%';
  pin.style.top = v.y + '%';
  pin.innerHTML = `
    <img src="/Vault_-_Fortnite_fnspots.webp" alt="Vault" style="width:36px;height:36px;filter:drop-shadow(0 0 8px rgba(239,159,39,.9)) drop-shadow(0 2px 6px rgba(0,0,0,.8));"/>
    <div class="tooltip" style="border-color:#EF9F27;">🔐 Vault</div>
  `;
  pin.dataset.layer = 'vault';
  vaultLayer.appendChild(pin);
});

// Build guardian layer
const guardianLayer = document.getElementById('guardianLayer');
GUARDIANS.forEach((g) => {
  const pin = document.createElement('div');
  pin.className = 'chest-pin';
  pin.style.left = g.x + '%';
  pin.style.top = g.y + '%';
  pin.innerHTML = `
    <img src="/The_Guardian_Fortnite_fnspots.webp" alt="Guardian" style="width:36px;height:36px;filter:drop-shadow(0 0 8px rgba(55,138,221,.9)) drop-shadow(0 2px 6px rgba(0,0,0,.8));"/>
    <div class="tooltip" style="border-color:#378ADD;">🛡️ Stealth Guardian Missing Case</div>
  `;
  pin.dataset.layer = 'guardian';
  guardianLayer.appendChild(pin);
});

// POI LABELS
const POIS = [
  { x: 42, y: 6,  name: 'Lifty Lodge' },
  { x: 27, y: 23, name: 'Chopped Shop' },
  { x: 46, y: 17, name: 'The Battlewoods' },

  { x: 22, y: 50, name: 'Heatwave Harbor' },
  { x: 42, y: 59, name: 'Sunken Shores' },
  { x: 62, y: 60, name: 'Cluster Coast' },
];

// FISHY SPRITE LOCATIONS
const FISHYS = [
  { x: 18.4, y: 10.6, poi: 'Fishy Sprite' },
  { x: 59.9, y: 24.5, poi: 'Fishy Sprite' },
  { x: 13.1, y: 52.1, poi: 'Fishy Sprite' },
  { x: 62.7, y: 60.1, poi: 'Fishy Sprite' },
  { x: 53.1, y: 77.5, poi: 'Fishy Sprite' },
  { x: 47.1, y: 79.5, poi: 'Fishy Sprite' },
];

// VAULT LOCATIONS
const VAULTS = [
  { x: 22.9, y: 21.1, poi: 'Vault' },
  { x: 39.0, y: 37.4, poi: 'Vault' },
  { x: 49.5, y: 42.3, poi: 'Vault' },
  { x: 58.8, y: 35.6, poi: 'Vault' },
  { x: 39.0, y: 60.7, poi: 'Vault' },
  { x: 22.6, y: 66.6, poi: 'Vault' },
  { x: 48.4, y: 72.7, poi: 'Vault' },
  { x: 62.8, y: 70.5, poi: 'Vault' },
];

// STEALTH GUARDIAN LOCATIONS
const GUARDIANS = [
  { x: 18.3, y: 46.8, poi: 'Stealth Guardian' },
  { x: 23.1, y: 43.0, poi: 'Stealth Guardian' },
  { x: 28.5, y: 44.4, poi: 'Stealth Guardian' },
  { x: 62.2, y: 26.3, poi: 'Stealth Guardian' },
  { x: 58.4, y: 31.1, poi: 'Stealth Guardian' },
  { x: 67.2, y: 33.5, poi: 'Stealth Guardian' },
  { x: 71.5, y: 32.9, poi: 'Stealth Guardian' },
  { x: 21.6, y: 52.3, poi: 'Stealth Guardian' },
  { x: 61.6, y: 62.8, poi: 'Stealth Guardian' },
  { x: 67.2, y: 63.4, poi: 'Stealth Guardian' },
  { x: 66.8, y: 67.2, poi: 'Stealth Guardian' },
  { x: 62.2, y: 68.6, poi: 'Stealth Guardian' },
];

// Build chest layer
const chestLayer = document.getElementById('chestLayer');
CHESTS.forEach((c, i) => {
  const pin = document.createElement('div');
  pin.className = 'chest-pin';
  pin.style.left = c.x + '%';
  pin.style.top = c.y + '%';
  pin.innerHTML = `
    <img src="/Sprite_Chest_Fortnite_fnspots.webp" alt="Sprite Chest"/>
    <div class="tooltip">${c.poi}</div>
  `;
  pin.dataset.layer = 'chests';
  chestLayer.appendChild(pin);
});

// Build POI layer
const poiLayer = document.getElementById('poiLayer');
POIS.forEach(p => {
  const label = document.createElement('div');
  label.className = 'poi-label';
  label.style.left = p.x + '%';
  label.style.top = p.y + '%';
  label.textContent = p.name;
  label.dataset.layer = 'poi';
  poiLayer.appendChild(label);
});

// Toggle layers
function toggleLayer(layer) {
  layers[layer] = !layers[layer];
  const btn = document.getElementById('btn' + layer.charAt(0).toUpperCase() + layer.slice(1));
  btn.classList.toggle('active', layers[layer]);
  document.querySelectorAll(`[data-layer="${layer}"]`).forEach(el => {
    el.classList.toggle('hidden', !layers[layer]);
  });
}

// ZOOM
function zoom(delta) {
  const container = mapContainer.getBoundingClientRect();
  const cx = container.width / 2;
  const cy = container.height / 2;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
  const ratio = newScale / scale;
  posX = cx - ratio * (cx - posX);
  posY = cy - ratio * (cy - posY);
  scale = newScale;
  applyTransform();
}

function resetView() {
  const container = mapContainer.getBoundingClientRect();
  const fitScale = Math.min(container.width / MAP_SIZE, container.height / MAP_SIZE) * 0.95;
  scale = fitScale;
  posX = (container.width - MAP_SIZE * scale) / 2;
  posY = (container.height - MAP_SIZE * scale) / 2;
  applyTransform();
}

function applyTransform() {
  mapInner.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// DRAG — Mouse
mapContainer.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  startPosX = posX;
  startPosY = posY;
  mapContainer.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  posX = startPosX + (e.clientX - startX);
  posY = startPosY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  mapContainer.style.cursor = 'grab';
});

// DRAG — Touch
mapContainer.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startPosX = posX;
    startPosY = posY;
  }
}, { passive: true });
mapContainer.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  posX = startPosX + (e.touches[0].clientX - startX);
  posY = startPosY + (e.touches[0].clientY - startY);
  applyTransform();
}, { passive: true });
mapContainer.addEventListener('touchend', () => { isDragging = false; });

// PINCH ZOOM
let lastDist = 0;
mapContainer.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
mapContainer.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const delta = (dist - lastDist) * 0.01;
    lastDist = dist;
    scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
    applyTransform();
  }
}, { passive: true });

// SCROLL ZOOM
mapContainer.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.15 : 0.15;
  const rect = mapContainer.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
  const ratio = newScale / scale;
  posX = mx - ratio * (mx - posX);
  posY = my - ratio * (my - posY);
  scale = newScale;
  applyTransform();
}, { passive: false });

// Init centered — wait for image to load to get real dimensions
const mapImgEl = document.getElementById('mapImg');
function initMap() {
  MAP_SIZE = mapImgEl.naturalWidth || mapImgEl.offsetWidth || 1100;
  mapInner.style.width = MAP_SIZE + 'px';
  mapInner.style.height = MAP_SIZE + 'px';
  const container = mapContainer.getBoundingClientRect();
  const fitScale = Math.min(container.width / MAP_SIZE, container.height / MAP_SIZE) * 0.95;
  scale = fitScale;
  posX = (container.width - MAP_SIZE * scale) / 2;
  posY = (container.height - MAP_SIZE * scale) / 2;
  applyTransform();
}
if (mapImgEl.complete && mapImgEl.naturalWidth > 0) {
  initMap();
} else {
  mapImgEl.addEventListener('load', initMap);
}
window.addEventListener('resize', initMap);
</script>
</body>
