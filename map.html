<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FNSpots — C7S3 Interactive Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet"/>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--fn:'Anton',sans-serif;--bg:#0d0221;--surface:#1a1230;--border:#2e2050;--text:#f0f0f0;--muted:#8A8278;--purple:#7f77dd;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

    /* HEADER */
    .site-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-shrink:0;}
    .site-title{font-family:var(--fn);font-size:18px;letter-spacing:.06em;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;}
    .site-title img{height:20px;width:20px;object-fit:contain;}
    .site-sub{font-family:var(--fn);font-size:9px;letter-spacing:.06em;color:var(--muted);}
    .back-btn{font-family:var(--fn);font-size:11px;letter-spacing:.05em;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);background:transparent;cursor:pointer;text-decoration:none;white-space:nowrap;}
    .back-btn:hover{background:rgba(255,255,255,.1);}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
    .toolbar-title{font-family:var(--fn);font-size:13px;letter-spacing:.05em;color:#fff;margin-right:4px;}

    .layer-btn{font-family:var(--fn);font-size:10px;letter-spacing:.05em;padding:5px 12px;border-radius:99px;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
    .layer-btn:hover{border-color:rgba(255,255,255,.5);color:#fff;}
    .layer-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;}
    .layer-btn img{width:16px;height:16px;object-fit:contain;}

    .zoom-btns{margin-left:auto;display:flex;gap:4px;}
    .zoom-btn{font-family:var(--fn);font-size:14px;width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);background:rgba(255,255,255,.05);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .zoom-btn:hover{background:rgba(255,255,255,.15);color:#fff;}

    /* MAP CONTAINER */
    .map-container{flex:1;overflow:hidden;position:relative;cursor:grab;user-select:none;}
    .map-container:active{cursor:grabbing;}
    .map-inner{position:absolute;transform-origin:0 0;transition:none;}
    .map-img{display:block;width:800px;height:800px;object-fit:cover;}

    /* CHEST PINS */
    .chest-pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1);z-index:10;}
    .chest-pin img{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));transition:all .2s;}
    .chest-pin:hover img,.chest-pin:active img{transform:scale(1.5);filter:drop-shadow(0 0 12px rgba(127,119,221,.9)) drop-shadow(0 4px 8px rgba(0,0,0,.8));}
    .chest-pin.hidden{display:none;}

    /* TOOLTIP */
    .chest-pin .tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(13,2,33,.95);border:1px solid var(--purple);border-radius:8px;padding:6px 10px;font-family:var(--fn);font-size:10px;letter-spacing:.04em;color:#fff;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;}
    .chest-pin:hover .tooltip{opacity:1;}

    /* POI LABELS */
    .poi-label{position:absolute;transform:translate(-50%,-50%);font-family:var(--fn);font-size:9px;letter-spacing:.05em;color:rgba(255,255,255,.7);text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 8px rgba(0,0,0,.8);pointer-events:none;white-space:nowrap;z-index:5;}
    .poi-label.hidden{display:none;}

    /* LEGEND */
    .legend{position:absolute;bottom:16px;right:16px;background:rgba(13,2,33,.9);border:1px solid var(--border);border-radius:12px;padding:10px 14px;z-index:30;}
    .legend-title{font-family:var(--fn);font-size:10px;letter-spacing:.05em;color:var(--muted);margin-bottom:8px;}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:10px;color:rgba(255,255,255,.7);margin-bottom:4px;}
    .legend-item img{width:20px;height:20px;object-fit:contain;}
    .legend-count{font-family:var(--fn);font-size:12px;color:#fff;margin-left:auto;}

    /* RESET BTN */
    .reset-view{position:absolute;bottom:16px;left:16px;font-family:var(--fn);font-size:10px;letter-spacing:.05em;padding:6px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);background:rgba(13,2,33,.8);cursor:pointer;z-index:30;}
    .reset-view:hover{background:rgba(255,255,255,.1);color:#fff;}
  </style>
</head>
<body>

<div class="site-header">
  <div>
    <a href="/" class="site-title">
      <img src="/Sprites_Icon_Fortnite_FNSpots.webp" alt="FNSpots"/>FNSpots <span style="font-size:11px;color:var(--purple);">BETA</span>
    </a>
    <div class="site-sub">by GamerMisterE</div>
  </div>
  <a href="/" class="back-btn" style="margin-left:auto;">← Tracker</a>
</div>

<div class="toolbar">
  <span class="toolbar-title">C7S3 Map</span>
  <button class="layer-btn active" id="btnChests" onclick="toggleLayer('chests')">
    <img src="/Sprite_Chest_Fortnite_fnspots.webp" alt="chest"/> Sprite Chests
    <span id="chestCount" style="background:rgba(255,255,255,.15);border-radius:99px;padding:1px 6px;">27</span>
  </button>
  <button class="layer-btn active" id="btnPOI" onclick="toggleLayer('poi')">
    📍 POI Labels
  </button>
  <div class="zoom-btns">
    <button class="zoom-btn" onclick="zoom(0.25)">+</button>
    <button class="zoom-btn" onclick="zoom(-0.25)">−</button>
  </div>
</div>

<div class="map-container" id="mapContainer">
  <div class="map-inner" id="mapInner">
    <img src="/Shattered_Coast_Fortnite_fnspots.webp" class="map-img" id="mapImg" draggable="false"/>
    <div id="chestLayer"></div>
    <div id="poiLayer"></div>
  </div>
  <div class="legend">
    <div class="legend-title">LEGEND</div>
    <div class="legend-item">
      <img src="/Sprite_Chest_Fortnite_fnspots.webp" alt="chest"/>
      Sprite Chest
      <span class="legend-count">27</span>
    </div>
  </div>
  <button class="reset-view" onclick="resetView()">⌖ Reset View</button>
</div>

<script>
// Map state
let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX, startY, startPosX, startPosY;
const MAP_SIZE = 800;
const MIN_SCALE = 0.5;
const MAX_SCALE = 4;

const mapInner = document.getElementById('mapInner');
const mapContainer = document.getElementById('mapContainer');

// Layer visibility
const layers = { chests: true, poi: true };

// CHEST LOCATIONS — percentage based (x%, y% of map)
const CHESTS = [
  // Lifty Lodge
  { x: 42, y: 8,  poi: 'Lifty Lodge' },
  // The Battlewoods
  { x: 44, y: 19, poi: 'The Battlewoods' },
  { x: 49, y: 22, poi: 'The Battlewoods' },
  { x: 47, y: 25, poi: 'The Battlewoods' },
  // Latte Landing
  { x: 58, y: 15, poi: 'Latte Landing' },
  { x: 62, y: 19, poi: 'Latte Landing' },
  // Wonkeeland
  { x: 72, y: 19, poi: 'Wonkeeland' },
  { x: 76, y: 24, poi: 'Wonkeeland' },
  // Chopped Shop
  { x: 27, y: 25, poi: 'Chopped Shop' },
  // Frosted Flats
  { x: 50, y: 32, poi: 'Frosted Flats' },
  { x: 54, y: 35, poi: 'Frosted Flats' },
  // Golden Grove
  { x: 72, y: 34, poi: 'Golden Grove' },
  { x: 76, y: 38, poi: 'Golden Grove' },
  // Calamari Canyon
  { x: 30, y: 36, poi: 'Calamari Canyon' },
  { x: 34, y: 39, poi: 'Calamari Canyon' },
  { x: 31, y: 43, poi: 'Calamari Canyon' },
  // Sinister Strip
  { x: 44, y: 43, poi: 'Sinister Strip' },
  { x: 48, y: 45, poi: 'Sinister Strip' },
  { x: 46, y: 49, poi: 'Sinister Strip' },
  // Shaken Sanctuary
  { x: 57, y: 44, poi: 'Shaken Sanctuary' },
  { x: 59, y: 49, poi: 'Shaken Sanctuary' },
  // Heatwave Harbor
  { x: 21, y: 52, poi: 'Heatwave Harbor' },
  { x: 25, y: 57, poi: 'Heatwave Harbor' },
  // Sunken Shores
  { x: 38, y: 61, poi: 'Sunken Shores' },
  { x: 43, y: 63, poi: 'Sunken Shores' },
  // Cluster Coast
  { x: 60, y: 62, poi: 'Cluster Coast' },
  { x: 64, y: 65, poi: 'Cluster Coast' },
];

// POI LABELS
const POIS = [
  { x: 42, y: 6,  name: 'Lifty Lodge' },
  { x: 27, y: 23, name: 'Chopped Shop' },
  { x: 46, y: 17, name: 'The Battlewoods' },
  { x: 60, y: 13, name: 'Latte Landing' },
  { x: 74, y: 17, name: 'Wonkeeland' },
  { x: 52, y: 30, name: 'Frosted Flats' },
  { x: 74, y: 32, name: 'Golden Grove' },
  { x: 31, y: 34, name: 'Calamari Canyon' },
  { x: 46, y: 41, name: 'Sinister Strip' },
  { x: 58, y: 42, name: 'Shaken Sanctuary' },
  { x: 22, y: 50, name: 'Heatwave Harbor' },
  { x: 42, y: 59, name: 'Sunken Shores' },
  { x: 62, y: 60, name: 'Cluster Coast' },
];

// Build chest layer
const chestLayer = document.getElementById('chestLayer');
CHESTS.forEach((c, i) => {
  const pin = document.createElement('div');
  pin.className = 'chest-pin';
  pin.style.left = c.x + '%';
  pin.style.top = c.y + '%';
  pin.innerHTML = `
    <img src="/Sprite_Chest_Fortnite_fnspots.webp" alt="Sprite Chest"/>
    <div class="tooltip">${c.poi}</div>
  `;
  pin.dataset.layer = 'chests';
  chestLayer.appendChild(pin);
});

// Build POI layer
const poiLayer = document.getElementById('poiLayer');
POIS.forEach(p => {
  const label = document.createElement('div');
  label.className = 'poi-label';
  label.style.left = p.x + '%';
  label.style.top = p.y + '%';
  label.textContent = p.name;
  label.dataset.layer = 'poi';
  poiLayer.appendChild(label);
});

// Toggle layers
function toggleLayer(layer) {
  layers[layer] = !layers[layer];
  const btn = document.getElementById('btn' + layer.charAt(0).toUpperCase() + layer.slice(1));
  btn.classList.toggle('active', layers[layer]);
  document.querySelectorAll(`[data-layer="${layer}"]`).forEach(el => {
    el.classList.toggle('hidden', !layers[layer]);
  });
}

// ZOOM
function zoom(delta) {
  const container = mapContainer.getBoundingClientRect();
  const cx = container.width / 2;
  const cy = container.height / 2;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
  const ratio = newScale / scale;
  posX = cx - ratio * (cx - posX);
  posY = cy - ratio * (cy - posY);
  scale = newScale;
  applyTransform();
}

function resetView() {
  scale = 1;
  const container = mapContainer.getBoundingClientRect();
  posX = (container.width - MAP_SIZE) / 2;
  posY = (container.height - MAP_SIZE) / 2;
  applyTransform();
}

function applyTransform() {
  mapInner.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// DRAG — Mouse
mapContainer.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  startPosX = posX;
  startPosY = posY;
  mapContainer.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  posX = startPosX + (e.clientX - startX);
  posY = startPosY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  mapContainer.style.cursor = 'grab';
});

// DRAG — Touch
mapContainer.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startPosX = posX;
    startPosY = posY;
  }
}, { passive: true });
mapContainer.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  posX = startPosX + (e.touches[0].clientX - startX);
  posY = startPosY + (e.touches[0].clientY - startY);
  applyTransform();
}, { passive: true });
mapContainer.addEventListener('touchend', () => { isDragging = false; });

// PINCH ZOOM
let lastDist = 0;
mapContainer.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
mapContainer.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const delta = (dist - lastDist) * 0.01;
    lastDist = dist;
    scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
    applyTransform();
  }
}, { passive: true });

// SCROLL ZOOM
mapContainer.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.15 : 0.15;
  const rect = mapContainer.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
  const ratio = newScale / scale;
  posX = mx - ratio * (mx - posX);
  posY = my - ratio * (my - posY);
  scale = newScale;
  applyTransform();
}, { passive: false });

// Init centered
window.addEventListener('load', () => {
  const container = mapContainer.getBoundingClientRect();
  posX = (container.width - MAP_SIZE) / 2;
  posY = (container.height - MAP_SIZE) / 2;
  applyTransform();
});
</script>
</body>
</html>
