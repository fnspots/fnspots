<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FNSpots — Fortnite Sprite Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet"/>
  <script src="sprites.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--fn:'Luckiest Guy',sans-serif;--bg:#F5F0E8;--surface:#FFFFFF;--surface2:#EDE8DF;--border:#D8D0C4;--border-strong:#B8AFA0;--text:#2A2520;--muted:#8A8278;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:1.5rem 1rem;}

    /* HEADER */
    .header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;}
    .header-left{display:flex;flex-direction:column;gap:3px;}
    .header-title{font-family:var(--fn);font-size:26px;letter-spacing:.06em;color:#2A2520;line-height:1;}
    .header-sub{font-family:var(--fn);font-size:10px;letter-spacing:.07em;color:var(--muted);line-height:1;}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
    .progress-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .progress-bar{width:130px;height:7px;background:var(--border);border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:99px;background:#7f77dd;transition:width .3s;}
    .progress-row{display:flex;align-items:baseline;gap:7px;}
    .progress-count{font-family:var(--fn);font-size:12px;color:var(--muted);}
    .progress-pct{font-family:var(--fn);font-size:26px;color:#2A2520;line-height:1;}
    .auth-btn{font-family:var(--fn);font-size:11px;letter-spacing:.05em;padding:7px 16px;border-radius:99px;border:1.5px solid #7f77dd;color:#7f77dd;background:transparent;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .auth-btn:hover{background:#7f77dd;color:#fff;}
    .auth-btn.logged{border-color:var(--border-strong);color:var(--muted);display:flex;align-items:center;gap:7px;}
    .auth-avatar{width:24px;height:24px;border-radius:50%;background:#7f77dd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-family:var(--fn);}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.12);padding:26px;width:310px;display:flex;flex-direction:column;gap:14px;position:relative;}
    .modal-title{font-family:var(--fn);font-size:20px;letter-spacing:.06em;color:#2A2520;text-align:center;}
    .modal-sub{font-size:11px;color:var(--muted);text-align:center;margin-top:-8px;}
    .modal-tabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
    .tab{flex:1;font-family:var(--fn);font-size:11px;letter-spacing:.05em;padding:7px;text-align:center;cursor:pointer;color:var(--muted);background:var(--surface2);transition:all .15s;}
    .tab.active{background:#7f77dd;color:#fff;}
    .modal-fields{display:flex;flex-direction:column;gap:8px;}
    .field-label{font-family:var(--fn);font-size:10px;letter-spacing:.05em;color:var(--muted);margin-bottom:2px;}
    .field-input{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:#2A2520;font-size:13px;outline:none;transition:border .15s;}
    .field-input:focus{border-color:#7f77dd;}
    .modal-cta{font-family:var(--fn);font-size:13px;letter-spacing:.06em;padding:11px;border-radius:10px;border:none;background:#7f77dd;color:#fff;cursor:pointer;transition:background .15s;}
    .modal-cta:hover{background:#6560c5;}
    .modal-error{font-size:11px;color:#D4537E;text-align:center;min-height:14px;}
    .modal-close{position:absolute;top:13px;right:15px;font-size:17px;cursor:pointer;color:var(--muted);background:none;border:none;}
    .modal-footer{font-size:10px;color:var(--muted);text-align:center;}

    /* VARIANTS ROW */
    .variants-row{display:grid;grid-template-columns:170px repeat(6,1fr);gap:5px;margin-bottom:6px;}
    .variants-row span{font-family:var(--fn);font-size:10px;text-align:center;padding:5px 3px;border-radius:8px;letter-spacing:.05em;cursor:default;}

    .v-base{background:linear-gradient(135deg,#c8c5be,#edeae3 40%,#b0ada6 60%,#e5e2db);color:#3a3830;border:1px solid #a5a29b;text-shadow:0 1px 0 rgba(255,255,255,.6);}
    .v-gold{background:linear-gradient(135deg,#9a7000,#ffd700 20%,#ffe566 42%,#c8960a 58%,#ffe066 76%,#9a7000);color:#3d2800;border:1px solid #a07800;text-shadow:0 1px 0 rgba(255,220,50,.6);box-shadow:inset 0 1px 0 rgba(255,255,180,.4);}
    .v-gummy{background:linear-gradient(135deg,#e06080,#fac0d0 30%,#ff8fab 52%,#fcd8e8 72%,#d04868);color:#5c0020;border:1px solid #c0406a;text-shadow:0 1px 0 rgba(255,200,210,.7);box-shadow:inset 0 1px 0 rgba(255,255,255,.35);}
    .v-galaxy{background:linear-gradient(135deg,#0d0221,#3a1c71 22%,#7b3fb0 42%,#a060d0 55%,#4b1082 72%,#8040f8);color:#e0c8ff;border:1px solid #6b2fa0;text-shadow:0 0 8px rgba(180,100,255,.9);box-shadow:inset 0 1px 0 rgba(200,150,255,.2);}
    .v-holo{background:linear-gradient(115deg,#ff6b6b,#ffa500 14%,#ffe000 26%,#00e888 40%,#00cfff 52%,#7b68ee 64%,#ff69b4 76%,#ff6b6b 90%);background-size:250% 250%;color:#1a0a2e;border:1px solid rgba(255,255,255,.5);text-shadow:0 1px 0 rgba(255,255,255,.7);box-shadow:inset 0 1px 0 rgba(255,255,255,.5);animation:holo 3s linear infinite;position:relative;overflow:hidden;}
    .v-holo::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(50deg,transparent 0px,rgba(255,255,255,.07) 1px,transparent 2px,transparent 5px);pointer-events:none;}
    @keyframes holo{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    .v-gem{background:linear-gradient(155deg,#b8e0f8,#fff 12%,#60c0e8 28%,#1a90c8 46%,#fff 54%,#50b0d8 68%,#1060a0 84%,#b0d8f5);color:#002840;border:1px solid #2090c0;text-shadow:0 1px 0 rgba(255,255,255,.9);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 0 8px rgba(30,140,200,.2);position:relative;overflow:hidden;}
    .v-gem::before{content:'';position:absolute;top:0;left:20%;width:30%;height:55%;background:linear-gradient(180deg,rgba(255,255,255,.7) 0%,transparent 100%);border-radius:0 0 50% 50%;pointer-events:none;}

    /* GRID */
    .sprite-row{display:grid;grid-template-columns:170px repeat(6,1fr);gap:5px;margin-bottom:5px;align-items:start;}
    .sprite-info{display:flex;flex-direction:column;gap:4px;padding:3px 5px;}
    .sprite-title{display:flex;align-items:center;gap:7px;}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .sname{font-family:var(--fn);font-size:13px;color:#2A2520;}
    .cost-tag{font-size:9px;color:var(--muted);margin-left:auto;white-space:nowrap;}
    .ability{font-size:9px;color:var(--muted);line-height:1.4;padding-left:15px;}
    .cell-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .cell{width:100%;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;overflow:hidden;position:relative;}
    .cell:hover{border-color:var(--border-strong);transform:scale(1.06);}
    .cell:active{transform:scale(0.94);}
    .cell img{width:86%;height:86%;object-fit:contain;opacity:.3;filter:grayscale(70%);transition:all .2s;pointer-events:none;}
    .cell.unlocked img{opacity:1;filter:none;}
    .cell .lk{position:absolute;font-size:12px;color:var(--muted);pointer-events:none;transition:opacity .15s;}
    .cell.unlocked .lk{opacity:0;}
    .cell.off{opacity:.15;cursor:not-allowed;pointer-events:none;}
    .cell.b.unlocked{border:2px solid #888780;}
    .cell.go.unlocked{border:2px solid #EF9F27;box-shadow:0 0 6px #EF9F2788;}
    .cell.gu.unlocked{border:2px solid #D4537E;box-shadow:0 0 6px #D4537E88;}
    .cell.ga.unlocked{border:2px solid #7F77DD;box-shadow:0 0 6px #7F77DD88;}
    .cell.h.unlocked{border:2px solid #1D9E75;box-shadow:0 0 6px #1D9E7588;}
    .cell.ge.unlocked{border:2px solid #378ADD;box-shadow:0 0 6px #378ADD88;}
    .sw{width:100%;padding:0 2px;}
    input.lvl{width:100%;height:4px;accent-color:#7f77dd;cursor:pointer;}
    input.lvl.m{accent-color:#EF9F27;}
    .ll{font-family:var(--fn);font-size:9px;color:var(--muted);text-align:center;min-height:12px;letter-spacing:.04em;}
    .sep-wrap{display:grid;grid-template-columns:170px repeat(6,1fr);gap:5px;}
    .sep{height:.5px;background:var(--border);margin:2px 0;grid-column:1/-1;}

    /* FOOTER */
    .footer{margin-top:1.25rem;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
    .pill{font-family:var(--fn);font-size:11px;letter-spacing:.04em;padding:4px 11px;border-radius:99px;border:.5px solid var(--border);color:var(--muted);background:var(--surface);}
    .pill strong{color:#2A2520;}
    .rbtn{margin-left:auto;font-family:var(--fn);font-size:11px;letter-spacing:.04em;padding:4px 14px;border-radius:99px;border:.5px solid var(--border-strong);color:var(--muted);background:transparent;cursor:pointer;}
    .rbtn:hover{background:var(--surface);}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;font-family:var(--fn);font-size:12px;letter-spacing:.05em;padding:9px 20px;border-radius:99px;z-index:200;transition:opacity .4s;pointer-events:none;}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">FNSpots ✨</span>
    <span class="header-sub">by gamermistere</span>
  </div>
  <div class="header-right">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
      <div class="progress-row">
        <span class="progress-count" id="pcount">0 / 107</span>
        <span class="progress-pct" id="ppct">0%</span>
      </div>
    </div>
    <button class="auth-btn" id="authBtn" onclick="openModal()">🔓 Save Progress</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">FNSpots ✨</div>
    <div class="modal-sub" id="mSub">Save your collection across devices</div>
    <div class="modal-tabs">
      <div class="tab active" id="tCreate" onclick="switchTab('create')">Create Account</div>
      <div class="tab" id="tLogin" onclick="switchTab('login')">Log In</div>
    </div>
    <div class="modal-fields" id="mFields"></div>
    <div class="modal-error" id="mErr"></div>
    <button class="modal-cta" id="mCta" onclick="handleAuth()">Create Account</button>
    <div class="modal-footer">Your progress saves automatically ✨</div>
  </div>
</div>

<div class="variants-row">
  <span></span>
  <span class="v-base">Base</span>
  <span class="v-gold">Gold</span>
  <span class="v-gummy">Gummy</span>
  <span class="v-galaxy">Galaxy</span>
  <span class="v-holo">Holofoil</span>
  <span class="v-gem">Gem</span>
</div>

<div id="grid"></div>

<div class="footer">
  <span class="pill">Base <strong id="s-b">0/18</strong></span>
  <span class="pill">Gold <strong id="s-go">0/17</strong></span>
  <span class="pill">Gummy <strong id="s-gu">0/17</strong></span>
  <span class="pill">Galaxy <strong id="s-ga">0/17</strong></span>
  <span class="pill">Holofoil <strong id="s-h">0/17</strong></span>
  <span class="pill">Gem <strong id="s-ge">0/17</strong></span>
  <button class="rbtn" onclick="resetAll()">Reset</button>
</div>

<script>
const VV=["b","go","gu","ga","h","ge"];
const KEY="fnspots-v4";
let state={};try{state=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){}
let user=null,curTab="create";

function openModal(){
  if(user){if(confirm("Logged in as "+user.tag+"\n\nLog out?")){user=null;updBtn();}return;}
  renderFields();document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(){document.getElementById("modalOverlay").classList.remove("open");}
function handleOverlay(e){if(e.target===document.getElementById("modalOverlay"))closeModal();}
function switchTab(t){
  curTab=t;
  document.getElementById("tCreate").classList.toggle("active",t==="create");
  document.getElementById("tLogin").classList.toggle("active",t==="login");
  document.getElementById("mCta").textContent=t==="create"?"Create Account":"Log In";
  document.getElementById("mSub").textContent=t==="create"?"Save your collection across devices":"Welcome back!";
  document.getElementById("mErr").textContent="";
  renderFields();
}
function renderFields(){
  document.getElementById("mFields").innerHTML=curTab==="create"
    ?`<div><div class="field-label">Gamertag</div><input class="field-input" id="f-tag" placeholder="e.g. Mutron" maxlength="20"></div><div><div class="field-label">Email</div><input class="field-input" id="f-email" type="email" placeholder="you@email.com"></div><div><div class="field-label">Password</div><input class="field-input" id="f-pass" type="password" placeholder="Min. 6 characters"></div>`
    :`<div><div class="field-label">Email</div><input class="field-input" id="f-email" type="email" placeholder="you@email.com"></div><div><div class="field-label">Password</div><input class="field-input" id="f-pass" type="password" placeholder="Your password"></div>`;
}
function handleAuth(){
  const err=document.getElementById("mErr");err.textContent="";
  const email=document.getElementById("f-email")?.value.trim();
  const pass=document.getElementById("f-pass")?.value;
  if(!email||!pass){err.textContent="Please fill in all fields.";return;}
  if(pass.length<6){err.textContent="Password must be at least 6 characters.";return;}
  const tag=curTab==="create"?document.getElementById("f-tag")?.value.trim():email.split("@")[0];
  if(curTab==="create"&&!tag){err.textContent="Gamertag is required.";return;}
  user={tag,email};closeModal();updBtn();
  toast(curTab==="create"?"Account created! Progress saved ✨":"Logged in! Progress synced ✨");
}
function updBtn(){
  const btn=document.getElementById("authBtn");
  if(user){btn.className="auth-btn logged";btn.innerHTML=`<div class="auth-avatar">${user.tag[0].toUpperCase()}</div>${user.tag}`;}
  else{btn.className="auth-btn";btn.innerHTML="🔓 Save Progress";}
}
function toast(msg){
  const p=document.createElement("div");p.className="toast";p.textContent=msg;
  document.body.appendChild(p);
  setTimeout(()=>{p.style.opacity="0";setTimeout(()=>p.remove(),400);},2500);
}

function buildGrid(){
  const grid=document.getElementById("grid");
  SPRITES.forEach((sp,si)=>{
    if(si>0){
      const sw=document.createElement("div");sw.className="sep-wrap";
      const s=document.createElement("div");s.className="sep";
      sw.appendChild(s);grid.appendChild(sw);
    }
    const row=document.createElement("div");row.className="sprite-row";
    const info=document.createElement("div");info.className="sprite-info";
    info.innerHTML=`<div class="sprite-title"><div class="dot" style="background:${sp.dot}"></div><span class="sname">${sp.name}</span><span class="cost-tag">✨ ${sp.cost.toLocaleString()}</span></div><div class="ability">${sp.ab}</div>`;
    row.appendChild(info);
    VV.forEach(v=>{
      const off=sp.noV&&v!=="b";
      const ck=`${si}-${v}`;const lk=`${si}-${v}-lv`;
      const file=sp.imgs[v]||"";
      const wrap=document.createElement("div");wrap.className="cell-wrap";
      const cell=document.createElement("div");cell.className=`cell ${v}${off?" off":""}`;
      if(!off&&state[ck])cell.classList.add("unlocked");
      if(file){const img=document.createElement("img");img.src=file;img.alt=sp.name;img.loading="lazy";cell.appendChild(img);}
      const lkEl=document.createElement("span");lkEl.className="lk";lkEl.textContent=off?"":"🔒";cell.appendChild(lkEl);
      const sw2=document.createElement("div");sw2.className="sw";
      const sl=document.createElement("input");sl.type="range";sl.className="lvl";sl.min=0;sl.max=5;sl.step=1;sl.value=off?0:(state[lk]||0);sl.disabled=off;if(off)sl.style.opacity=".15";
      const lb=document.createElement("div");lb.className="ll";
      if(!off){
        cell.onclick=()=>{state[ck]=!state[ck];if(!state[ck])state[lk]=0;cell.classList.toggle("unlocked",state[ck]);rfr(si,v,sl,lb);save();upd();};
        sl.oninput=()=>{const val=parseInt(sl.value);state[lk]=val;if(val>0&&!state[ck]){state[ck]=true;cell.classList.add("unlocked");}if(val===0){state[ck]=false;cell.classList.remove("unlocked");}rfr(si,v,sl,lb);save();upd();};
      }
      rfr(si,v,sl,lb);sw2.appendChild(sl);sw2.appendChild(lb);wrap.appendChild(cell);wrap.appendChild(sw2);row.appendChild(wrap);
    });
    grid.appendChild(row);
  });
  upd();
}

function rfr(si,v,sl,lb){const c=state[`${si}-${v}-lv`]||0;sl.value=c;if(c===0){lb.textContent="";sl.className="lvl";}else if(c===5){lb.textContent="★ MASTERED";lb.style.color="#EF9F27";sl.className="lvl m";}else{lb.textContent=`Lv ${c}`;lb.style.color="var(--muted)";sl.className="lvl";}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function upd(){
  const c={b:0,go:0,gu:0,ga:0,h:0,ge:0};let t=0;
  SPRITES.forEach((sp,si)=>VV.forEach(v=>{if(sp.noV&&v!=="b")return;if(state[`${si}-${v}`]){t++;c[v]++;}}));
  const p=Math.round(t/107*100);
  document.getElementById("pbar").style.width=p+"%";
  document.getElementById("pcount").textContent=`${t} / 107`;
  document.getElementById("ppct").textContent=`${p}%`;
  document.getElementById("s-b").textContent=c.b+"/18";
  document.getElementById("s-go").textContent=c.go+"/17";
  document.getElementById("s-gu").textContent=c.gu+"/17";
  document.getElementById("s-ga").textContent=c.ga+"/17";
  document.getElementById("s-h").textContent=c.h+"/17";
  document.getElementById("s-ge").textContent=c.ge+"/17";
}
function resetAll(){
  if(!confirm("Reset all progress?"))return;
  state={};try{localStorage.removeItem(KEY);}catch(e){}
  document.querySelectorAll(".cell").forEach(c=>c.classList.remove("unlocked"));
  document.querySelectorAll("input.lvl").forEach(s=>s.value=0);
  document.querySelectorAll(".ll").forEach(l=>l.textContent="");
  upd();
}

renderFields();
buildGrid();
</script>
</body>
</html>
