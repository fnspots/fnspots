<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FNSpots — Map Coordinate Picker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#1a1a2e;color:#fff;font-family:'Inter',sans-serif;display:flex;height:100vh;overflow:hidden;}

    /* SIDEBAR */
    .sidebar{width:280px;flex-shrink:0;background:#0d0d1a;border-right:1px solid #2e2e4e;display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-header{padding:16px;border-bottom:1px solid #2e2e4e;}
    .sidebar-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px;}
    .sidebar-sub{font-size:11px;color:#8A8278;}

    .layer-select{padding:12px 16px;border-bottom:1px solid #2e2e4e;}
    .layer-select label{font-size:11px;color:#8A8278;display:block;margin-bottom:6px;}
    .layer-select input{width:100%;padding:6px 10px;border-radius:6px;border:1px solid #2e2e4e;background:#1a1a2e;color:#fff;font-size:12px;outline:none;}
    .layer-select input:focus{border-color:#7f77dd;}

    .coords-list{flex:1;overflow-y:auto;padding:12px;}
    .coords-title{font-size:11px;color:#8A8278;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    .coord-item{background:#1a1a2e;border:1px solid #2e2e4e;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:11px;display:flex;justify-content:space-between;align-items:center;}
    .coord-item .coord-poi{color:#7f77dd;font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .coord-item .coord-xy{color:#8A8278;font-family:monospace;}
    .coord-item .del-btn{color:#D4537E;cursor:pointer;font-size:14px;padding:0 4px;}
    .coord-item .del-btn:hover{color:#ff6b8a;}

    .actions{padding:12px 16px;border-top:1px solid #2e2e4e;display:flex;flex-direction:column;gap:8px;}
    .action-btn{padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;}
    .action-btn.copy{background:#7f77dd;color:#fff;}
    .action-btn.copy:hover{background:#6560c5;}
    .action-btn.clear{background:#2e2e4e;color:#8A8278;}
    .action-btn.clear:hover{background:#3e3e5e;color:#fff;}

    .output{margin-top:8px;background:#0d0d1a;border:1px solid #2e2e4e;border-radius:8px;padding:10px;font-size:10px;font-family:monospace;color:#7f77dd;white-space:pre-wrap;max-height:120px;overflow-y:auto;display:none;}
    .output.show{display:block;}

    /* MAP AREA */
    .map-area{flex:1;overflow:hidden;position:relative;cursor:crosshair;}
    .map-wrap{position:absolute;transform-origin:0 0;}
    .map-img{display:block;}
    
    .pin{position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:10;}
    .pin-dot{width:14px;height:14px;border-radius:50%;background:#7f77dd;border:2px solid #fff;box-shadow:0 0 8px rgba(127,119,221,.8);}
    .pin-dot.boss{background:#A32D2D;box-shadow:0 0 8px rgba(163,45,45,.8);}
    .pin-label{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);border:1px solid #7f77dd;border-radius:4px;padding:2px 6px;font-size:9px;white-space:nowrap;color:#fff;}

    .crosshair{position:absolute;pointer-events:none;z-index:20;display:none;}
    .crosshair-h{position:absolute;height:1px;background:rgba(127,119,221,.4);left:0;right:0;}
    .crosshair-v{position:absolute;width:1px;background:rgba(127,119,221,.4);top:0;bottom:0;}

    .coords-display{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);border:1px solid #2e2e4e;border-radius:8px;padding:6px 14px;font-size:12px;font-family:monospace;color:#7f77dd;pointer-events:none;z-index:30;}

    .instructions{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);border:1px solid #7f77dd;border-radius:10px;padding:10px 16px;font-size:12px;color:#fff;text-align:center;z-index:30;white-space:nowrap;}
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">🗺️ Coordinate Picker</div>
    <div class="sidebar-sub">Click the map to place pins. Copy coordinates when done.</div>
  </div>

  <div class="layer-select">
    <label>POI Name for next pin:</label>
    <input type="text" id="poiName" placeholder="e.g. Chopped Shop" value=""/>
  </div>

  <div class="coords-list">
    <div class="coords-title">
      <span>Placed Pins</span>
      <span id="pinCount" style="color:#7f77dd;">0 pins</span>
    </div>
    <div id="pinList"></div>
  </div>

  <div class="actions">
    <button class="action-btn copy" onclick="copyCoords()">📋 Copy Coordinates</button>
    <button class="action-btn clear" onclick="clearAll()">🗑️ Clear All</button>
    <div class="output" id="output"></div>
  </div>
</div>

<div class="map-area" id="mapArea">
  <div class="map-wrap" id="mapWrap">
    <img 
      src="https://fnspots.com/Shattered_Coast_Fortnite_fnspots.webp" 
      id="mapImg" 
      class="map-img"
      draggable="false"
    />
    <div id="pinsLayer"></div>
  </div>

  <div class="crosshair" id="crosshair">
    <div class="crosshair-h" id="ch"></div>
    <div class="crosshair-v" id="cv"></div>
  </div>

  <div class="coords-display" id="coordsDisplay">x: 0%, y: 0%</div>
  <div class="instructions">👆 Click anywhere on the map to place a pin · Scroll to zoom · Drag to pan</div>
</div>

<script>
let pins = [];
let scale = 1;
let posX = 0, posY = 0;
let isDragging = false;
let startX, startY, startPosX, startPosY;
let mapSize = 800;

const mapWrap = document.getElementById('mapWrap');
const mapArea = document.getElementById('mapArea');
const mapImg = document.getElementById('mapImg');
const pinsLayer = document.getElementById('pinsLayer');
const coordsDisplay = document.getElementById('coordsDisplay');
const crosshair = document.getElementById('crosshair');

// Set map size once loaded
mapImg.onload = () => {
  mapSize = mapImg.naturalWidth;
  mapWrap.style.width = mapSize + 'px';
  mapWrap.style.height = mapSize + 'px';
  resetView();
};

function resetView() {
  const rect = mapArea.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height) * 0.9;
  scale = size / mapSize;
  posX = (rect.width - mapSize * scale) / 2;
  posY = (rect.height - mapSize * scale) / 2;
  applyTransform();
}

function applyTransform() {
  mapWrap.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// Mouse move — show crosshair and coords
mapArea.addEventListener('mousemove', e => {
  const rect = mapArea.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Crosshair
  crosshair.style.display = 'block';
  crosshair.style.left = '0';
  crosshair.style.top = '0';
  crosshair.style.width = rect.width + 'px';
  crosshair.style.height = rect.height + 'px';
  document.getElementById('ch').style.top = my + 'px';
  document.getElementById('cv').style.left = mx + 'px';

  // Map coords
  const mapX = ((mx - posX) / (mapSize * scale) * 100);
  const mapY = ((my - posY) / (mapSize * scale) * 100);
  coordsDisplay.textContent = `x: ${mapX.toFixed(1)}%, y: ${mapY.toFixed(1)}%`;
});

mapArea.addEventListener('mouseleave', () => {
  crosshair.style.display = 'none';
});

// Click — place pin
mapArea.addEventListener('click', e => {
  if (wasDragging) return;
  const rect = mapArea.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const mapX = ((mx - posX) / (mapSize * scale) * 100);
  const mapY = ((my - posY) / (mapSize * scale) * 100);

  if (mapX < 0 || mapX > 100 || mapY < 0 || mapY > 100) return;

  const poi = document.getElementById('poiName').value.trim() || 'Unknown';
  const pin = { x: parseFloat(mapX.toFixed(1)), y: parseFloat(mapY.toFixed(1)), poi };
  pins.push(pin);
  renderPin(pin, pins.length - 1);
  updateList();
});

function renderPin(pin, idx) {
  const el = document.createElement('div');
  el.className = 'pin';
  el.id = `pin-${idx}`;
  el.style.left = pin.x + '%';
  el.style.top = pin.y + '%';
  el.innerHTML = `<div class="pin-dot"></div><div class="pin-label">${pin.poi}</div>`;
  pinsLayer.appendChild(el);
}

function updateList() {
  const list = document.getElementById('pinList');
  document.getElementById('pinCount').textContent = pins.length + ' pins';
  list.innerHTML = '';
  pins.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'coord-item';
    item.innerHTML = `
      <span class="coord-poi">${p.poi}</span>
      <span class="coord-xy">${p.x}%, ${p.y}%</span>
      <span class="del-btn" onclick="deletePin(${i})">×</span>
    `;
    list.appendChild(item);
  });
}

function deletePin(idx) {
  pins.splice(idx, 1);
  pinsLayer.innerHTML = '';
  pins.forEach((p, i) => renderPin(p, i));
  updateList();
}

function clearAll() {
  if (!confirm('Clear all pins?')) return;
  pins = [];
  pinsLayer.innerHTML = '';
  updateList();
  document.getElementById('output').classList.remove('show');
}

function copyCoords() {
  const lines = pins.map(p => `  { x: ${p.x}, y: ${p.y}, poi: '${p.poi}' },`).join('\n');
  const output = `const PINS = [\n${lines}\n];`;
  navigator.clipboard.writeText(output).catch(() => {});
  const el = document.getElementById('output');
  el.textContent = output;
  el.classList.add('show');
}

// Drag
let wasDragging = false;
mapArea.addEventListener('mousedown', e => {
  isDragging = true;
  wasDragging = false;
  startX = e.clientX;
  startY = e.clientY;
  startPosX = posX;
  startPosY = posY;
  mapArea.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) wasDragging = true;
  posX = startPosX + dx;
  posY = startPosY + dy;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  mapArea.style.cursor = 'crosshair';
});

// Scroll zoom
mapArea.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = mapArea.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  const newScale = Math.min(5, Math.max(0.3, scale + delta));
  const ratio = newScale / scale;
  posX = mx - ratio * (mx - posX);
  posY = my - ratio * (my - posY);
  scale = newScale;
  applyTransform();
}, { passive: false });

window.addEventListener('resize', resetView);
</script>
</body>
</html>
